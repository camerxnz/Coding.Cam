<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <style>
  :root{ --bg:#07102b; --card: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); }
  body{ margin:0; min-height:100vh; min-height:100dvh; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background: linear-gradient(180deg, #080712 0%, #0e063a 60%); color:#e8eefc; }
  .welcome-wrap{ display:flex; align-items:center; justify-content:center; min-height:100vh; min-height:100dvh; padding:60px 18px; box-sizing:border-box; }
    .welcome-card{ background: rgba(255,255,255,0.01); padding:28px; border-radius:18px; box-shadow: 0 40px 120px rgba(2,6,23,0.6); border:1px solid rgba(255,255,255,0.04); max-width:920px; width:100%; display:flex; gap:20px; align-items:center; }
    .welcome-left{ flex:1; }
    /* Fluid typography uses clamp to avoid cutoffs on small screens */
    .welcome-title{ font-size:clamp(20px, 4.5vw, 40px); margin:0 0 8px 0; color:#f7fbff; font-weight:800; line-height:1.03; }
    .welcome-sub{ color:#fff; margin:0 0 18px 0; font-size:clamp(0.95rem, 2.2vw, 1.1rem); }
    .welcome-cta{ display:inline-flex; align-items:center; gap:12px; padding:12px 18px; border-radius:12px; background: linear-gradient(180deg, #ffffff, #e9f0ff); color:#07102b; font-weight:800; box-shadow: 0 8px 32px rgba(2,6,23,0.45); cursor:pointer; transform-style:preserve-3d; transition: transform 220ms ease, box-shadow 220ms ease; }
    .welcome-cta:active{ transform: translateY(1px) translateZ(-6px); }
    .arrow{ width:18px; height:18px; transform:translateZ(8px); }
    /* ensure the stars canvas covers full viewport without creating scroll */
  #welcomeStars{ position:fixed; left:0; top:0; width:100vw; width:100dvw; height:100vh; height:100dvh; z-index:-1; pointer-events:none; }
    .stardust-layer{ position:absolute; inset:auto; pointer-events:none; }
    @media (max-width:720px){ .welcome-card{ padding:18px; border-radius:14px; } .welcome-title{ font-size:clamp(18px, 7vw, 26px); } .welcome-cta{ padding:10px 14px; } /* reduce heavy shadows on small screens */ .welcome-card, .welcome-cta{ box-shadow: 0 10px 28px rgba(2,6,23,0.45); }
    }
    .welcome-btn-3d {
      border-radius: 64px !important;
      padding: 44px 90px 38px 90px !important;
      font-size: 2.8rem !important;
    }
    @media (max-width: 900px) {
      .welcome-btn-3d {
        font-size: 1.7rem !important;
        padding: 28px 48px 22px 48px !important;
        border-radius: 40px !important;
      }
    }
    @media (max-width: 700px) {
      .welcome-btn-3d {
        font-size: 1.2rem !important;
        padding: 18px 32px 14px 32px !important;
        border-radius: 28px !important;
      }
    }
    @media (max-width: 400px) {
      .welcome-btn-3d {
        font-size: 0.9rem !important;
        padding: 10px 16px 8px 16px !important;
        border-radius: 16px !important;
      }
    }
  </style>
  <style>
    .welcome-overlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      /* match About page background for consistency */
      background: linear-gradient(180deg, #080712 0%, #0e063a 60%);
      display: flex;
      align-items: center;
      justify-content: center;
      /* ensure full-screen on mobile; dvh first then fallback */
      height: 100dvh;
      height: 100vh;
      transition: opacity 0.7s cubic-bezier(.4,1.7,.6,1), visibility 0.7s;
      opacity: 1;
      visibility: visible;
      overflow: hidden;
    }
    .welcome-overlay.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .welcome-btn-3d {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 64px 28px 64px;
      border-radius: 200px;
      background: linear-gradient(120deg, #181c2f 80%, #232a4a 100%);
      box-shadow:
        0 24px 96px 0 #010314cc,
        0 2px 0 #0a0c18 inset,
        0 0 0 8px #1d0f5c44;
      font-family: 'Baloo 2', cursive, 'Times New Roman', Times, serif, sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: #0a0709;
      letter-spacing: 2px;
      border: none;
      outline: none;
      cursor: pointer;
      transition:
        transform 0.18s cubic-bezier(.4,1.7,.6,1),
        box-shadow 0.25s,
        background 0.3s,
        filter 0.3s;
      will-change: transform, box-shadow, filter;
      position: relative;
      user-select: none;
      perspective: 800px;
      animation: welcome-pop 1.2s cubic-bezier(.4,1.7,.6,1) 0.2s both, welcome-float 3.2s ease-in-out infinite;
      filter: drop-shadow(0 0 48px #010314cc);
    }
    .welcome-btn-3d:active {
      transform: scale(0.97) rotateX(2deg) rotateY(-2deg);
      box-shadow:
        0 4px 16px 0 #01031499,
        0 1px 0 #0a0c18 inset;
      background: linear-gradient(120deg, #02030a 80%, #080a14 100%);
      filter: drop-shadow(0 0 12px #1d0f5c99);
    }
    .welcome-btn-3d:hover, .welcome-btn-3d:focus-visible {
      transform:
        scale(1.13)
        rotateX(-18deg)
        rotateY(18deg)
        skewY(-2deg)
        translateY(-8px);
      box-shadow:
        0 64px 180px 0 rgba(6,8,23,0.85),
        0 6px 18px rgba(0,0,0,0.45) inset,
        0 0 0 14px rgba(6,8,23,0.36);
      /* darker hover background for a more dramatic, moody entrance */
      background: linear-gradient(120deg, #0b0c18 72%, #06060b 100%);
      color: #e6e9ff;
      filter: drop-shadow(0 0 28px rgba(0,0,0,0.8)) brightness(0.95);
    }
    @keyframes welcome-pop {
      0% { opacity: 0; transform: scale(0.7) rotateX(40deg);}
      70% { opacity: 1; transform: scale(1.08) rotateX(-10deg);}
      100% { opacity: 1; transform: scale(1) rotateX(0);}
    }
    @keyframes welcome-float {
      0%, 100% { transform: translateY(0) scale(1) rotateX(0) rotateY(0);}
      50% { transform: translateY(-18px) scale(1.04) rotateX(-6deg) rotateY(6deg);}
    }
    .welcome-animated-arrow {
      margin-top: 18px;
      width: 77px;
      height: 55px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: arrow-bounce 2s infinite cubic-bezier(.4,1.7,.6,1);
      filter: drop-shadow(0 4px 16px #030305e0);
    }
    /* Dark-toned arrow stroke by default */
    .welcome-animated-arrow svg path {
      stroke: #0b0b12; /* dark navy/near-black */
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 220ms ease, opacity 220ms ease, filter 220ms ease;
      opacity: 0.95;
      filter: drop-shadow(0 1px 6px rgba(0,0,0,0.6));
    }
    /* Slight accent on hover without brightening too much */
    .welcome-btn-3d:hover .welcome-animated-arrow svg path,
    .welcome-btn-3d:focus-visible .welcome-animated-arrow svg path {
      stroke: #1b2433; /* subtle dark-blue accent */
      opacity: 1;
      filter: drop-shadow(0 3px 12px rgba(0,0,0,0.7));
    }
    @keyframes arrow-bounce {
      0%, 100% { transform: translateY(0);}
      50% { transform: translateY(16px);}
    }
    /* Welcome overlay shooting stars */
    .welcome-stars-canvas {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
      filter: blur(0.5px) brightness(1.2) drop-shadow(0 0 12px #02125588);
      opacity: 0.92;
      transition: opacity 0.7s;
    }
    .welcome-overlay.hide .welcome-stars-canvas {
      opacity: 0;
    }
    @media (max-width: 700px) {
      .welcome-btn-3d {
        font-size: 1.2rem;
        padding: 18px 32px 14px 32px;
        border-radius: 28px;
      }
      .welcome-animated-arrow {
        width: 28px;
        height: 28px;
        margin-top: 10px;
      }
    }
    /* Subtext and stardust */
    .welcome-subtext{
      display:block;
      font-size:1.05rem;
      font-weight:600;
      letter-spacing:1.2px;
      color: #ffffff; /* white text */
      margin-top:8px;
      z-index: 3;
      transform: translateZ(18px);
    }
    .stardust-layer{ position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:0; }
    .stardust-particle{ position:absolute; width:6px; height:6px; border-radius:50%; background: linear-gradient(180deg, #fff, #cfe4ff); opacity:0.95; box-shadow: 0 0 8px rgba(120,170,255,0.9); transform: translateY(0) scale(1); transition: transform 1200ms linear, opacity 800ms linear; }
  </style>
  <div class="welcome-overlay" id="welcomeOverlay">
    <canvas class="welcome-stars-canvas" id="welcomeStars"></canvas>
    <button class="welcome-btn-3d" id="welcomeBtn" tabindex="1">
      Welcome!
      <span class="welcome-subtext">Click to Enter</span>
      <span class="welcome-animated-arrow">
        <!-- Animated Down Arrow SVG -->
        <svg width="100%" height="100%" viewBox="0 0 44 44" fill="none">
          <path d="M22 12v20" stroke="#4f6fff" stroke-width="4" stroke-linecap="round"/>
          <path d="M12 28l10 10 10-10" stroke="#4f6fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <animateTransform attributeName="transform" type="translate" values="0 0; 0 8; 0 0" dur="1.2s" repeatCount="indefinite"/>
        </svg>
      </span>
      <!-- stardust particle layer (populated by JS on hover) -->
      <div class="stardust-layer" aria-hidden="true"></div>
    </button>
  </div>
  <script>
    // Hide overlay and allow site interaction after click
    const welcomeOverlay = document.getElementById('welcomeOverlay');
    const welcomeBtn = document.getElementById('welcomeBtn');
    function hideWelcome() {
      welcomeOverlay.classList.add('hide');
      setTimeout(() => {
        welcomeOverlay.style.display = 'none';
      }, 800);
      // Optionally focus main content or title
      setTimeout(() => {
        const mainTitle = document.getElementById('dynamic-title');
        if (mainTitle) mainTitle.focus();
      }, 900);
    }
    welcomeBtn.addEventListener('click', hideWelcome);
    welcomeBtn.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        hideWelcome();
      }
    });
    // Prevent scrolling/interacting with background while overlay is shown
    document.body.style.overflow = 'hidden';
    welcomeOverlay.addEventListener('transitionend', () => {
      if (welcomeOverlay.classList.contains('hide')) {
        document.body.style.overflow = '';
      }
    });

  // Stardust particle effect for the subtext when hovered
    (function(){
  const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  // Respect global preference and our low-power heuristic from canvasUtils if present
  const globalReduced = prefersReduced || (window.canvasUtils && window.canvasUtils.prefersReducedMotion);
  const lowPower = window.canvasUtils && window.canvasUtils.lowPowerMode;
  if(globalReduced) return;
      const btn = document.getElementById('welcomeBtn');
      const layer = btn.querySelector('.stardust-layer');
      let spawnTimer = null;

      function spawnParticle(x, y){
        const p = document.createElement('div'); p.className = 'stardust-particle';
        const size = 4 + Math.random()*6; p.style.width = size + 'px'; p.style.height = size + 'px';
        p.style.left = (x - size/2) + 'px'; p.style.top = (y - size/2) + 'px';
        layer.appendChild(p);
        // random horizontal drift and fall distance
        const drift = (Math.random() - 0.5) * 120; // px
        const fall = 160 + Math.random()*220; // px
        // animate via transform to keep it GPU-friendly
        requestAnimationFrame(()=>{
          p.style.transform = `translate(${drift}px, ${fall}px) scale(${0.6 + Math.random()*0.5})`;
          p.style.opacity = '0';
        });
        // remove after animation
        setTimeout(()=>{ try{ p.remove(); }catch(e){} }, 1400);
      }

      function onEnter(e){
        // continuous spawn while hovered
        const rect = btn.getBoundingClientRect();
        const interval = lowPower ? 220 : 90;
        spawnTimer = setInterval(()=>{
          const rx = rect.left + rect.width*0.5 + (Math.random()-0.5)*rect.width*0.6;
          const ry = rect.top + rect.height*0.6 + (Math.random()-0.2)*24;
          spawnParticle(rx - rect.left, ry - rect.top);
        }, interval);
      }
      function onLeave(){ if(spawnTimer){ clearInterval(spawnTimer); spawnTimer = null; } }

    btn.addEventListener('pointerenter', onEnter);
    btn.addEventListener('pointerleave', onLeave);
      // touch support: spawn a burst on touchstart
      btn.addEventListener('touchstart', e=>{ const rect = btn.getBoundingClientRect(); for(let i=0;i<14;i++){ const rx = rect.width*0.5 + (Math.random()-0.5)*rect.width*0.8; const ry = rect.height*0.6 + (Math.random()-0.4)*24; spawnParticle(rx, ry); } }, {passive:true});
    })();

    // --- Welcome Overlay Shooting Stars & Static Stars ---
    const welcomeStars = document.getElementById('welcomeStars');
    // Use shared canvas helper if available for DPR-aware sizing
    let welcomeDestroyDPR = null;
    if(window.canvasUtils && window.canvasUtils.setCanvasDPR){
      welcomeDestroyDPR = window.canvasUtils.setCanvasDPR(welcomeStars, { resize: true });
    } else {
      function resizeWelcomeStars() {
        const dpr = window.devicePixelRatio || 1;
    const cssW = welcomeStars.clientWidth || document.documentElement.clientWidth || window.innerWidth;
    const cssH = welcomeStars.clientHeight || document.documentElement.clientHeight || window.innerHeight;
    welcomeStars.width = Math.round(cssW * dpr);
    welcomeStars.height = Math.round(cssH * dpr);
  // use dynamic viewport units where supported for mobile browsers
  welcomeStars.style.width = CSS && CSS.supports && CSS.supports('width','100dvw') ? '100dvw' : '100vw';
  welcomeStars.style.height = CSS && CSS.supports && CSS.supports('height','100dvh') ? '100dvh' : '100vh';
        const ctx = welcomeStars.getContext('2d');
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(dpr, dpr);
      }
      window.addEventListener('resize', resizeWelcomeStars);
      resizeWelcomeStars();
    }

    // Star data
    const wStaticStars = [];
    const wShootingStars = [];
    function genWelcomeStaticStars() {
      wStaticStars.length = 0;
  const sw = welcomeStars.clientWidth || document.documentElement.clientWidth || window.innerWidth;
  const sh = welcomeStars.clientHeight || document.documentElement.clientHeight || window.innerHeight;
  const count = Math.floor(sw * sh / 1200);
      for (let i = 0; i < count; i++) {
        wStaticStars.push({
    x: Math.random() * (welcomeStars.clientWidth || document.documentElement.clientWidth || window.innerWidth),
    y: Math.random() * (welcomeStars.clientHeight || document.documentElement.clientHeight || window.innerHeight),
          radius: Math.random() * 1.2 + 0.3,
          alpha: Math.random() * 0.7 + 0.2,
          twinkle: Math.random() * 0.04 + 0.01,
          baseAlpha: Math.random() * 0.7 + 0.2,
          color: Math.random() < 0.85
            ? 'rgba(180,200,255,1)'
            : (Math.random() < 0.5 ? 'rgba(120,170,255,1)' : 'rgba(200,220,255,1)')
        });
      }
    }
    genWelcomeStaticStars();
    window.addEventListener('resize', genWelcomeStaticStars);

    function spawnWelcomeShootingStar() {
      if (Math.random() < 0.012) {
  const heightRef = welcomeStars.clientHeight || document.documentElement.clientHeight || window.innerHeight;
  const y = Math.random() * heightRef * 0.7 + heightRef * 0.1;
        wShootingStars.push({
          x: -120,
          y: y,
          len: 120 + Math.random() * 80,
          speed: 14 + Math.random() * 10,
          alpha: 1,
          width: 2.2 + Math.random() * 2.2,
          angle: Math.PI / 8 + Math.random() * Math.PI / 14
        });
      }
    }

    function drawWelcomeStaticStars(ctx) {
      for (const star of wStaticStars) {
        // Twinkle effect
        star.alpha += (Math.random() - 0.5) * star.twinkle;
        if (star.alpha > 1) star.alpha = 1;
        if (star.alpha < 0.15) star.alpha = 0.15;
        ctx.save();
        ctx.globalAlpha = star.alpha;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, 2 * Math.PI);
        ctx.fillStyle = star.color;
        ctx.shadowColor = '#4f6fff';
        ctx.shadowBlur = 12;
        ctx.fill();
        ctx.restore();
      }
    }

    function drawWelcomeShootingStars(ctx) {
      for (let i = wShootingStars.length - 1; i >= 0; i--) {
        const star = wShootingStars[i];
        ctx.save();
        ctx.globalAlpha = star.alpha;
        const dx = Math.cos(star.angle) * star.len;
        const dy = Math.sin(star.angle) * star.len;
        const grad = ctx.createLinearGradient(star.x, star.y, star.x + dx, star.y + dy);
        grad.addColorStop(0, 'rgba(120,200,255,1)');
        grad.addColorStop(0.5, 'rgba(0,120,255,0.8)');
        grad.addColorStop(1, 'rgba(0,0,64,0)');
        ctx.strokeStyle = grad;
        ctx.lineWidth = star.width;
        ctx.shadowColor = '#4f6fff';
        ctx.shadowBlur = 24;
        ctx.beginPath();
        ctx.moveTo(star.x, star.y);
        ctx.lineTo(star.x + dx, star.y + dy);
        ctx.stroke();
        ctx.restore();

        star.x += Math.cos(star.angle) * star.speed;
        star.y += Math.sin(star.angle) * star.speed;
        star.alpha -= 0.009;
  const wRef = welcomeStars.clientWidth || document.documentElement.clientWidth || window.innerWidth;
  const hRef = welcomeStars.clientHeight || document.documentElement.clientHeight || window.innerHeight;
  if (star.alpha <= 0 || star.x > wRef + 120 || star.y > hRef + 40) {
          wShootingStars.splice(i, 1);
        }
      }
    }

    function animateWelcomeStars() {
      const ctx = welcomeStars.getContext('2d');
      // clear using CSS size * DPR (canvas already scaled via helper)
      ctx.clearRect(0, 0, welcomeStars.width, welcomeStars.height);
      drawWelcomeStaticStars(ctx);
      // reduce shooting frequency on low-power devices
      const lowPowerMode = window.canvasUtils && window.canvasUtils.lowPowerMode;
      if(!lowPowerMode) spawnWelcomeShootingStar();
      drawWelcomeShootingStars(ctx);
      requestAnimationFrame(animateWelcomeStars);
    }
    animateWelcomeStars();

    // If canvas helper returned a destroy fn, expose it for cleanup when overlay closed
    welcomeOverlay._destroyCanvas && welcomeOverlay._destroyCanvas();
    welcomeOverlay._destroyCanvas = welcomeDestroyDPR;

    // Focus trap + Escape-to-close for welcome overlay using uiUtils
    if(window.uiUtils){
      let releaseTrap = null, releaseEsc = null;
      function openTrap(){
        releaseTrap = window.uiUtils.trapFocus(welcomeOverlay);
        releaseEsc = window.uiUtils.escClose(welcomeOverlay, hideWelcome);
      }
      // Open trap immediately (overlay is visible on load)
      openTrap();
      // When overlay hidden, release handlers
      welcomeOverlay.addEventListener('transitionend', ()=>{
        if(welcomeOverlay.classList.contains('hide')){
          releaseTrap && releaseTrap();
          releaseEsc && releaseEsc();
        }
      });
    }
  </script>

  <!-- Styles -->
  <style>
    /* General Body */
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #080712 0%, #0e063a 60%);
      font-family: Arial, sans-serif;
    }

    /* Floating Title */
    .floating-title {
      display: inline-block;
      font-size: 2.5rem;
      font-weight: bold;
      color: #010003;
      text-decoration: none;
      margin-bottom: 30px;
      animation: float 5s ease-in-out infinite;
      cursor: pointer;
      transition: color 0.5s;
      font-family: 'Baloo 2', cursive, sans-serif;
      letter-spacing: 2px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.10), 0 1px 0 #0a0404;
    }

    .floating-title:hover {
      color: #1d0f5c;
    }

    /* Floating Image */
    .floating-img {
      width: 400px;
      height: 400px;
      border-radius: 75px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      background: rgba(46, 43, 43, 0.6);
      backdrop-filter: blur(20px);
      animation: float 5s ease-in-out infinite;
      margin-bottom: 30px;
      object-fit: cover;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    /* Buttons */
    .button {
      display: inline-block;
      margin: 10px;
      padding: 12px 24px;
      border-radius: 100px;
      background: rgba(48, 42, 42, 0.7);
      backdrop-filter: blur(50px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      text-decoration: none;
      color: #0c0303;
      font-weight: bold;
      transition: transform 0.2s, background 0.3s;
    }

    .button:hover {
      transform: translateY(-5px);
      background: rgba(156, 142, 142, 0.9);
    }

    .button:active {
      transform: scale(1.05) translateY(-5px);
      box-shadow: 
        0 35px 70px rgba(0, 0, 0, 0.5),
        0 20px 30px rgba(0, 0, 0, 0.4),
        inset 0 4px 12px rgba(255, 255, 255, 0.25);
    }
  </style>

<body>

  <style>
    /* Global responsive helpers to avoid cutoffs and improve smooth feel */
    html, body { width:100%; min-height:100%; overflow-x:hidden; }
    img, video, canvas { max-width:100%; height:auto; display:block; }
    button, .button { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    /* Make floating title and image scale fluidly */
    .floating-title { font-size: clamp(1.6rem, 4vw, 3.5rem); }
    .floating-img { width: min(60vw, 400px); height: auto; max-width: 90vw; }

    /* Welcome button: fluid padding and clamp font-size so it never overflows small screens */
    .welcome-btn-3d { font-size: clamp(0.9rem, 4.5vw, 2.2rem); padding: clamp(12px, 3.5vw, 32px) clamp(24px, 6vw, 64px); }
    .welcome-subtext { font-size: clamp(0.85rem, 2.8vw, 1.05rem); }

    /* Reduce heavy shadows and animations on small screens for performance and non-cutoff */
    @media (max-width: 700px){
      .welcome-btn-3d { transform: none !important; box-shadow: 0 12px 36px rgba(6,8,23,0.5); }
      .welcome-animated-arrow { width: 36px; height: 28px; }
      .welcome-overlay { align-items: center; padding: 18px; }
      .welcome-stars-canvas { filter: blur(0.6px) brightness(1.05); }
    }
  </style>

  <!-- Floating Title with 3D Look and Interactive Hover Trick -->
  <a href="#" onclick="location.reload();" class="floating-title" id="dynamic-title">Coding.cam</a>
  <style>
    /* Enhanced 3D Title Effect */

<script>
  /*
    3D moving background effect with dark blue/black tones.
    Uses animated Perlin noise for a smooth, futuristic vibe.
    Static and shooting stars remain in the background.
  */

  // --- Perlin Noise Implementation (simple, fast) ---
  function Perlin(seed) {
    this.p = new Uint8Array(512);
    for (let i = 0; i < 256; ++i) this.p[i] = i;
    for (let i = 255; i > 0; --i) {
      const n = Math.floor((seed = (seed * 9301 + 49297) % 233280) / 233280 * (i + 1));
      [this.p[i], this.p[n]] = [this.p[n], this.p[i]];
    }
    for (let i = 0; i < 256; ++i) this.p[256 + i] = this.p[i];
  }
  Perlin.prototype.fade = t => t * t * t * (t * (t * 6 - 15) + 10);
  Perlin.prototype.lerp = (a, b, t) => a + t * (b - a);
  Perlin.prototype.grad = (hash, x, y) => ((hash & 1) ? -x : x) + ((hash & 2) ? -y : y);
  Perlin.prototype.noise = function(x, y) {
    const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
    x -= Math.floor(x); y -= Math.floor(y);
    const u = this.fade(x), v = this.fade(y);
    const A = this.p[X] + Y, B = this.p[X + 1] + Y;
    return this.lerp(
      this.lerp(this.grad(this.p[A], x, y), this.grad(this.p[B], x - 1, y), u),
      this.lerp(this.grad(this.p[A + 1], x, y - 1), this.grad(this.p[B + 1], x - 1, y - 1), u),
      v
    ) * 0.5 + 0.5;
  };

  // --- 3D Background Canvas ---
  const bgCanvas = document.createElement('canvas');
  bgCanvas.style.position = 'fixed';
  bgCanvas.style.top = 0;
  bgCanvas.style.left = 0;
  bgCanvas.style.width = '100vw';
  bgCanvas.style.width = (CSS && CSS.supports && CSS.supports('width','100dvw')) ? '100dvw' : '100vw';
  bgCanvas.style.height = (CSS && CSS.supports && CSS.supports('height','100dvh')) ? '100dvh' : '100vh';
  bgCanvas.style.zIndex = '-2';
  bgCanvas.style.pointerEvents = 'none';
  bgCanvas.style.background = '#16015f';
  document.body.prepend(bgCanvas);

  function resizeBgCanvas() {
  const bgW = bgCanvas.clientWidth || document.documentElement.clientWidth || window.innerWidth;
  const bgH = bgCanvas.clientHeight || document.documentElement.clientHeight || window.innerHeight;
  bgCanvas.width = bgW;
  bgCanvas.height = bgH;
  }
  window.addEventListener('resize', resizeBgCanvas);
  resizeBgCanvas();

  const bgCtx = bgCanvas.getContext('2d');
  const perlin = new Perlin(42);

  // --- Animate 3D Perlin Noise Waves ---
  function animate3DBG() {
    const w = bgCanvas.width, h = bgCanvas.height;
    const img = bgCtx.createImageData(w, h);
    const data = img.data;
    const t = performance.now() * 0.00018;
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        // 3D effect: use y as "depth", animate with t
        const nx = x / w - 0.5, ny = y / h - 0.5;
        const d = Math.sqrt(nx * nx + ny * ny);
        const z = t + d * 2.5;
        let n = perlin.noise(nx * 2.2 + t * 0.3, ny * 2.2 + t * 0.2 + Math.sin(t), z);
        n = Math.pow(n, 2.2); // contrast
        // Color mapping: deep blue/black, with subtle gradients
        const blue = Math.floor(38 + 110 * n);
        const r = Math.floor(5 + 18 * n * (1 - d));
        const g = Math.floor(10 + 30 * n * (1 - d));
        const idx = (y * w + x) * 4;
        data[idx] = r;
        data[idx + 1] = g;
        data[idx + 2] = blue;
        data[idx + 3] = 255;
      }
    }
    bgCtx.putImageData(img, 0, 0);
    requestAnimationFrame(animate3DBG);
  }
  animate3DBG();

  // --- Shooting Stars & Static Stars (from your previous code) ---

  // Blue shooting stars and realistic static stars in the background
  const starCanvas = document.createElement('canvas');
  starCanvas.style.position = 'fixed';
  starCanvas.style.top = 0;
  starCanvas.style.left = 0;
  starCanvas.style.width = (CSS && CSS.supports && CSS.supports('width','100dvw')) ? '100dvw' : '100vw';
  starCanvas.style.height = (CSS && CSS.supports && CSS.supports('height','100dvh')) ? '100dvh' : '100vh';
  starCanvas.style.pointerEvents = 'none';
  starCanvas.style.zIndex = 0;
  starCanvas.style.background = '#16015f';
  document.body.prepend(starCanvas);

  function resizeCanvas() {
  const scW = starCanvas.clientWidth || document.documentElement.clientWidth || window.innerWidth;
  const scH = starCanvas.clientHeight || document.documentElement.clientHeight || window.innerHeight;
  starCanvas.width = scW;
  starCanvas.height = scH;
    generateStaticStars();
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  const ctx = starCanvas.getContext('2d');
  const shootingStars = [];
  const staticStars = [];

  // Generate static stars with more realism (varying size, color, twinkle)
  function generateStaticStars() {
    staticStars.length = 0;
  const sW = starCanvas.clientWidth || document.documentElement.clientWidth || window.innerWidth;
  const sH = starCanvas.clientHeight || document.documentElement.clientHeight || window.innerHeight;
  const count = Math.floor(sW * sH / 1400);
    for (let i = 0; i < count; i++) {
      staticStars.push({
        x: Math.random() * starCanvas.width,
        y: Math.random() * starCanvas.height,
        radius: Math.random() * 0.9 + 0.2,
        alpha: Math.random() * 0.6 + 0.25,
        twinkle: Math.random() * 0.04 + 0.01,
        baseAlpha: Math.random() * 0.6 + 0.25,
        color: Math.random() < 0.85
          ? 'rgba(180,200,255,1)'
          : (Math.random() < 0.5 ? 'rgba(120,170,255,1)' : 'rgba(200,220,255,1)')
      });
    }
  }

  function spawnShootingStar() {
    if (Math.random() < 0.009) {
      const y = Math.random() * starCanvas.height * 0.7 + starCanvas.height * 0.1;
      shootingStars.push({
        x: -120,
        y: y,
        len: 120 + Math.random() * 80,
        speed: 12 + Math.random() * 8,
        alpha: 1,
        width: 1.3 + Math.random() * 1.5,
        angle: Math.PI / 8 + Math.random() * Math.PI / 18
      });
    }
  }

  function drawStaticStars() {
    for (const star of staticStars) {
      // Twinkle effect
      star.alpha += (Math.random() - 0.5) * star.twinkle;
      if (star.alpha > 1) star.alpha = 1;
      if (star.alpha < 0.15) star.alpha = 0.15;
      ctx.save();
      ctx.globalAlpha = star.alpha;
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.radius, 0, 2 * Math.PI);
      ctx.fillStyle = star.color;
      ctx.shadowColor = '#1a2a4a';
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.restore();
    }
  }

  function drawShootingStars() {
    for (let i = shootingStars.length - 1; i >= 0; i--) {
      const star = shootingStars[i];
      ctx.save();
      ctx.globalAlpha = star.alpha;
      const dx = Math.cos(star.angle) * star.len;
      const dy = Math.sin(star.angle) * star.len;
      const grad = ctx.createLinearGradient(star.x, star.y, star.x + dx, star.y + dy);
      grad.addColorStop(0, 'rgba(120,200,255,1)');
      grad.addColorStop(0.6, 'rgba(0,120,255,0.7)');
      grad.addColorStop(1, 'rgba(0,0,64,0)');
      ctx.strokeStyle = grad;
      ctx.lineWidth = star.width;
      ctx.beginPath();
      ctx.moveTo(star.x, star.y);
      ctx.lineTo(star.x + dx, star.y + dy);
      ctx.stroke();
      ctx.restore();

      star.x += Math.cos(star.angle) * star.speed;
      star.y += Math.sin(star.angle) * star.speed;
      star.alpha -= 0.008;
      if (star.alpha <= 0 || star.x > starCanvas.width + 120 || star.y > starCanvas.height + 40) {
        shootingStars.splice(i, 1);
      }
    }
  }

  function animateStars() {
    ctx.clearRect(0, 0, starCanvas.width, starCanvas.height);
    drawStaticStars();
    spawnShootingStar();
    drawShootingStars();
    requestAnimationFrame(animateStars);
  }
  animateStars();
</script>

    filter: drop-shadow(0 8px 32px #1d0f5c44);
    transition: transform 0.5s cubic-bezier(.23,1.12,.32,1), filter 0.4s;
  }
  .floating-computer:hover,
  .floating-phone:hover {
    transform: rotateY(-16deg) rotateX(10deg) scale(1.08) skewY(2deg);
    filter: drop-shadow(0 0 48px #4f6fff88);
  }
  .floating-computer {
    width: 220px;
    height: 180px;
    perspective: 900px;
  }
  .floating-phone {
    width: 70px;
    height: 140px;
    perspective: 900px;
    animation-delay: 0.7s;
  }
  @keyframes computer-float {
    0%, 100% { transform: rotateY(-12deg) rotateX(6deg) translateY(0) scale(1.04);}
    50% { transform: rotateY(10deg) rotateX(-6deg) translateY(-18px) scale(1.12);}
  }
  @media (max-width: 900px) {
    .floating-computer {
      width: 120px;
      height: 98px;
    }
    .floating-phone {
      width: 38px;
      height: 76px;
    }
    .floating-computer-container {
      left: 8px;
      gap: 10px;
    }
  }
  @media (max-width: 600px) {
    .floating-computer {
      width: 70px;
      height: 56px;
    }
    .floating-phone {
      width: 22px;
      height: 44px;
    }
    .floating-computer-container {
      left: 2px;
      gap: 4px;
    }
  }
  @media (max-width: 400px) {
    .floating-computer {
      width: 44px;
      height: 34px;
    }
    .floating-phone {
      width: 12px;
      height: 24px;
    }
  }
</style>
